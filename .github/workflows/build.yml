name: Build crbridge.dll

on:
  push:
    branches: [main, 'refactor/**', 'claude/**']
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write  # needed by the release step on tag pushes

jobs:
  build-windows:
    # windows-latest dropped the VS2022 instance the CMake generator expects;
    # pin to the image that still ships Visual Studio 2022.
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v5

      - name: Configure CMake
        run: cmake -S . -B build -G "Visual Studio 17 2022" -A x64

      - name: Build Release
        run: cmake --build build --config Release

      - name: Stage artifact (flatten DLLs to one directory)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifact | Out-Null
          Copy-Item build/Release/crbridge.dll artifact/
          Copy-Item build/proxy/Release/version.dll artifact/

      - name: Zip artifact for release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: Compress-Archive -Path artifact/* -DestinationPath crbridge.zip

      - name: Upload artifacts
        uses: actions/upload-artifact@v5
        with:
          name: crbridge
          path: artifact/

      - name: Create release on tag
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: crbridge.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
