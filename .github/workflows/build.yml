name: Build crbridge.dll

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Configure CMake
        run: cmake -S . -B build -G "Visual Studio 17 2022" -A x64

      - name: Build Release
        run: cmake --build build --config Release

      - name: Stage artifact (flatten DLLs to one directory)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifact | Out-Null
          Copy-Item build/Release/crbridge.dll artifact/
          Copy-Item build/proxy/Release/version.dll artifact/

      - name: Upload artifacts
        uses: actions/upload-artifact@v5
        with:
          name: crbridge
          path: artifact/
